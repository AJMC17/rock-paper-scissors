<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="javascript.js"></script>
</head>
<body>
    <script>
        let choices = ["rock", "paper", "scissors"]
        
        getComputerChoice = () => choices[Math.floor(Math.random() * choices.length)];

        // console.log(getComputerChoice());
    
        function playRound(playerSelection, computerSelection) {
            if (playerSelection === null) {
                return "Game cancelled."; 
            } else {
                let lcPlayerSelection = playerSelection.toLowerCase();
                if (lcPlayerSelection == computerSelection) {
                    return "It's a tie!";
                } else if (lcPlayerSelection == "rock" && computerSelection == "scissors") {
                    return "You win! Rock beats scissors.";
                } else if (lcPlayerSelection == "rock" && computerSelection == "paper") {
                    return "You lose! Paper beats rock.";
                } else if (lcPlayerSelection == "paper" && computerSelection == "rock") {
                    return "You win! Paper beats rock.";
                } else if (lcPlayerSelection == "paper" && computerSelection == "scissors") {
                    return "You lose! Scissors beats paper.";
                } else if (lcPlayerSelection == "scissors" && computerSelection == "rock") {
                    return "You lose! Rock beats scissors.";
                } else if (lcPlayerSelection == "scissors" && computerSelection == "paper") {
                    return "You win! Scissors beats paper.";
                } else {
                    return "Invalid input. Please try again.";
                }
            }
        }
        
        
        // const playerSelection = "rock";
        const computerSelection = getComputerChoice();
        for (let index = 1; index < 6; index++) {
            game();
            index++;
        }

        function game() {
            let playerSelection = prompt("Choose your weapon.");
            console.log(playRound(playerSelection, computerSelection));
        }
               

    </script>
</body>
</html>
